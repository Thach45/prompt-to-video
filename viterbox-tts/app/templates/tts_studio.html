<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viterbox AI - Phòng thu giọng nói chuyên nghiệp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      /* Hiệu ứng nền kẻ caro (Grid Background) */
      background-image: 
        linear-gradient(to right, rgba(203, 213, 225, 0.4) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(203, 213, 225, 0.4) 1px, transparent 1px);
      background-size: 30px 30px;
      color: #1e293b;
    }
    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(226, 232, 240, 1);
      box-shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.05);
    }
    .gradient-text {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .input-field {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      transition: all 0.2s;
    }
    .input-field:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      outline: none;
    }
    /* Tùy chỉnh thanh cuộn cho textarea */
    textarea::-webkit-scrollbar {
      width: 8px;
    }
    textarea::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
    }
  </style>
</head>
<body class="antialiased min-h-screen pb-20">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <!-- Header -->
    <header class="flex items-center justify-between py-6">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
          </svg>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-slate-900">Viterbox <span class="text-blue-600">AI</span></span>
      </div>
      
      <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-500">
        <a href="/" class="hover:text-blue-600 transition-colors">Trang chủ</a>
        <a href="/tts-studio" class="text-blue-600 font-semibold">Giọng nói AI</a>
      </nav>

      <div class="flex items-center gap-4">
        <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300"></div>
      </div>
    </header>

    <!-- Page Title -->
    <div class="mt-12 mb-10 text-center">
      <h1 class="text-4xl font-extrabold mb-3 text-slate-900">Phòng thu <span class="gradient-text">Giọng nói AI</span></h1>
      <p class="text-slate-500">Biến văn bản thành lời nói sống động với nền tảng lồng tiếng hiện đại.</p>
    </div>

    <!-- Main Studio Panel -->
    <div class="grid lg:grid-cols-3 gap-8">
      <!-- Left Column: Input Text -->
      <div class="lg:col-span-2 space-y-6">
        <div class="glass p-6 rounded-3xl">
          <div class="flex items-center justify-between mb-4">
            <label class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Nội dung văn bản</label>
            <span id="char-count" class="text-xs text-slate-400">0 / 5000 ký tự</span>
          </div>
          <textarea 
            id="text" 
            rows="12" 
            class="w-full input-field p-4 rounded-2xl text-lg resize-none shadow-sm"
            placeholder="Nhập nội dung bạn muốn chuyển thành giọng nói tại đây..."
          ></textarea>
          
          <div class="mt-6 flex items-center justify-between">
            <div class="flex gap-3">
               <button class="text-xs font-semibold px-5 py-2.5 rounded-xl bg-white text-slate-600 hover:bg-slate-50 transition-all border border-slate-200 shadow-sm">
                Làm sạch
               </button>
               <button class="text-xs font-semibold px-5 py-2.5 rounded-xl bg-white text-slate-600 hover:bg-slate-50 transition-all border border-slate-200 shadow-sm">
                Đọc thử bản nháp
               </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Settings -->
      <aside class="space-y-6">
        <div class="glass p-6 rounded-3xl">
          <h3 class="text-lg font-bold mb-6 flex items-center gap-2 text-slate-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0L8.43 3.5l-1.49.5a.75.75 0 01-.12.04l-.12.04-1.49.5-.08.03c-1.56.38-1.56 2.6 0 2.98l.33.08.5 1.49c.01.04.03.08.04.12l.04.12.5 1.49.03.08c.38 1.56 2.6 1.56 2.98 0l.08-.33 1.49-.5c.04-.01.08-.03.12-.04l.12-.04 1.49-.5.08-.03c1.56-.38 1.56-2.6 0-2.98l-.33-.08-.5-1.49a.75.75 0 01-.04-.12l-.04-.12-.5-1.49-.03-.08zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
            </svg>
            Cấu hình giọng đọc
          </h3>

          <div class="space-y-5">
            <!-- Language & Format -->
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-500 uppercase">Ngôn ngữ</label>
                <select id="language" class="w-full input-field p-2.5 rounded-xl text-sm">
                  <option value="vi">Tiếng Việt</option>
                  <option value="en">English</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-500 uppercase">Định dạng</label>
                <select id="output_format" class="w-full input-field p-2.5 rounded-xl text-sm">
                  <option value="mp3">MP3</option>
                  <option value="wav">WAV</option>
                </select>
              </div>
            </div>

            <!-- Voice Selection -->
            <div class="space-y-2">
              <label class="text-xs font-semibold text-slate-500 uppercase">Giọng mẫu (Reference)</label>
              <select id="reference_audio_path" class="w-full input-field p-2.5 rounded-xl text-sm">
                <option value="">-- Mặc định (Tự nhiên) --</option>
                {% for voice in voices %}
                <option value="{{ voice }}">{{ voice.split("/")[-1] }}</option>
                {% endfor %}
                <!-- Mockup options for preview -->
                <option value="v_hoai_nam">Hoài Nam (Nam Miền Bắc)</option>
                <option value="v_lan_huong">Lan Hương (Nữ Miền Bắc)</option>
                <option value="v_minh_quan">Minh Quân (Nam Miền Nam)</option>
              </select>
            </div>

            <hr class="border-slate-200">

            <!-- Advanced Parameters -->
            <div class="space-y-4">
              <div class="flex justify-between items-center">
                <label class="text-xs font-semibold text-slate-500 uppercase">Độ biểu cảm</label>
                <input id="exaggeration" type="number" class="w-16 input-field p-1.5 rounded-lg text-center text-xs font-bold" value="0.5" step="0.05" min="0" max="2">
              </div>
              <div class="flex justify-between items-center">
                <label class="text-xs font-semibold text-slate-500 uppercase">Độ bám giọng</label>
                <input id="cfg_weight" type="number" class="w-16 input-field p-1.5 rounded-lg text-center text-xs font-bold" value="0.5" step="0.05" min="0" max="1">
              </div>
              <div class="flex justify-between items-center">
                <label class="text-xs font-semibold text-slate-500 uppercase">Độ ngẫu nhiên</label>
                <input id="temperature" type="number" class="w-16 input-field p-1.5 rounded-lg text-center text-xs font-bold" value="0.8" step="0.05" min="0.1" max="1">
              </div>
              <div class="flex justify-between items-center">
                <label class="text-xs font-semibold text-slate-500 uppercase">Ngắt nghỉ (giây)</label>
                <input id="sentence_pause" type="number" class="w-16 input-field p-1.5 rounded-lg text-center text-xs font-bold" value="0.5" step="0.1" min="0" max="2">
              </div>
            </div>

            <button id="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 group mt-4 transform active:scale-[0.98]">
              <span>Tạo Audio Ngay</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Result Box -->
        <div id="result-box" class="glass p-6 rounded-3xl hidden border-blue-200 bg-blue-50/40">
          <p id="status" class="text-xs font-semibold text-slate-600 mb-4 uppercase tracking-tighter flex items-center gap-2"></p>
          <audio id="player" controls class="w-full h-10 opacity-90"></audio>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const player = document.getElementById("player");
    const resultBox = document.getElementById("result-box");
    const textInput = document.getElementById("text");
    const charCount = document.getElementById("char-count");

    // Cập nhật đếm ký tự
    textInput.addEventListener("input", () => {
      charCount.textContent = `${textInput.value.length} / 5000 ký tự`;
    });

    submitBtn.onclick = async () => {
      if (!textInput.value.trim()) {
        alert("Vui lòng nhập nội dung!");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
      resultBox.classList.remove('hidden');
      statusEl.className = "text-xs font-bold text-blue-600 mb-4 flex items-center gap-2 uppercase tracking-tighter";
      statusEl.innerHTML = `
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Đang tổng hợp âm thanh...
      `;
      player.removeAttribute("src");

      const payload = {
        text: textInput.value,
        language: document.getElementById("language").value,
        output_format: document.getElementById("output_format").value,
        reference_audio_path: document.getElementById("reference_audio_path").value || null,
        exaggeration: Number(document.getElementById("exaggeration").value),
        cfg_weight: Number(document.getElementById("cfg_weight").value),
        temperature: Number(document.getElementById("temperature").value),
        sentence_pause: Number(document.getElementById("sentence_pause").value)
      };

      try {
        const resp = await fetch("/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          const err = await resp.text();
          statusEl.className = "text-xs font-bold text-red-600 mb-4 uppercase tracking-tighter";
          statusEl.textContent = "✕ Lỗi hệ thống: " + err;
          return;
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        player.src = url;
        player.play();
        statusEl.className = "text-xs font-bold text-green-600 mb-4 uppercase tracking-tighter";
        statusEl.textContent = "✓ Hoàn tất tạo audio!";
      } catch (e) {
        statusEl.className = "text-xs font-bold text-red-600 mb-4 uppercase tracking-tighter";
        statusEl.textContent = "✕ Lỗi kết nối: " + e;
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    };
  </script>
</body>
</html>
